<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Main splatter circle -->
  <circle cx="32" cy="32" r="24" fill="#dc2626"/>

  <!-- Splatter details for organic look -->
  <ellipse cx="24" cy="20" rx="8" ry="5" fill="#ef4444" transform="rotate(-30 24 20)" opacity="0.8"/>
  <ellipse cx="40" cy="38" rx="6" ry="4" fill="#b91c1c" transform="rotate(45 40 38)" opacity="0.7"/>
  <ellipse cx="22" cy="36" rx="5" ry="3" fill="#ef4444" transform="rotate(-60 22 36)" opacity="0.6"/>

  <!-- White asterisk symbol -->
  <text x="32" y="39" font-family="monospace" font-size="28" font-weight="bold" text-anchor="middle" fill="white">*</text>

  <!-- Small exclamation point -->
  <circle cx="45" cy="20" r="2" fill="white"/>
  <rect x="44.5" y="24" width="1" height="6" fill="white"/>
</svg>