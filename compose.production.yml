# Production docker-compose for splat (SQLite flavour) — web + tuber + three
# worker sidecars (ingest, ducklake, scheduler), replacing the old single
# Solid Queue `jobs` service. Designed to run alongside the PG flavour on
# the same host, so volume paths, container names, host ports, and the
# tuber instance name are all suffixed/offset to avoid collision.
# Run with:
#
#   docker compose -f compose.production.yml -p splat-booko-sqlite up -d
#
# Required .env vars: HOST, HOST_IP, SECRET_KEY_BASE, SPLAT_HOST,
# SPLAT_INTERNAL_HOST, SPLAT_ADMIN_EMAILS, SPLAT_EMAIL_FROM, SMTP_*,
# MCP_AUTH_TOKEN, SENTRY_DSN, SENTRY_TRACES_SAMPLE_RATE, OIDC_*,
# SPLAT_ALLOWED_USERS.

x-common-variables: &common-variables
  RAILS_ENV: production
  SECRET_KEY_BASE: ${SECRET_KEY_BASE}
  SPLAT_HOST: ${SPLAT_HOST}
  SPLAT_INTERNAL_HOST: ${SPLAT_INTERNAL_HOST}
  SPLAT_ADMIN_EMAILS: ${SPLAT_ADMIN_EMAILS}
  SPLAT_EMAIL_FROM: ${SPLAT_EMAIL_FROM}

  SMTP_ADDRESS: ${SMTP_ADDRESS}
  SMTP_PORT: ${SMTP_PORT}
  SMTP_USER_NAME: ${SMTP_USER_NAME}
  SMTP_PASSWORD: ${SMTP_PASSWORD}

  MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN}
  SENTRY_DSN: ${SENTRY_DSN}
  SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE}

  # DuckDB defaults memory_limit to ~80% of physical RAM PER CONNECTION
  # and threads to all physical cores. Splat's workload is small COPYs +
  # short analytics scans, not large joins; per-connection budgets are
  # appropriate. 256MB × 1 thread keeps each Parquet write bounded.
  DUCKDB_MEMORY_LIMIT: 256MB
  DUCKDB_THREADS: "1"

  # Bodies stay in RAM until the COPY finishes. 100 reserved × ~few-MB
  # packed body fits comfortably under 1GB Ruby-side per consumer.
  DUCKLAKE_MIRROR_BATCH_SIZE: "100"

  # Send Rails logs to stdout so `docker compose logs <service>` shows
  # them. Without this, Rails writes to log/production.log and the bind-
  # mounted host dir needs UID 1000 perms — easy to get wrong on a fresh
  # deploy and silent when it's wrong.
  RAILS_LOG_TO_STDOUT: "true"

  # Container-to-container DNS uses the service name on the container port.
  # 11330 is only the host-side port mapping — irrelevant inside the network.
  TUBER_URL: tuber:11300

x-splat-worker: &splat-worker
  image: reg.tbdb.info/splat:sqlite-latest
  restart: unless-stopped
  depends_on:
    - tuber
  volumes:
    - /storage/splat-booko-sqlite/storage:/rails/storage
  environment:
    <<: *common-variables
  logging:
    driver: "json-file"
    options:
      max-size: "100m"
      max-file: "3"

services:
  web:
    image: reg.tbdb.info/splat:sqlite-latest
    environment:
      <<: *common-variables
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL}
      OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME}
      OIDC_REQUIRE_PKCE: ${OIDC_REQUIRE_PKCE}
      SPLAT_ALLOWED_USERS: ${SPLAT_ALLOWED_USERS}
    volumes:
      - /storage/splat-booko-sqlite/storage:/rails/storage
      - /storage/splat-booko-sqlite/logs/web:/rails/log
    ports:
      - "${HOST_IP}:3031:3000"
    depends_on:
      - tuber
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  ingest:
    <<: *splat-worker
    container_name: splat-booko-sqlite-ingest
    command: bin/ingest_worker
    volumes:
      - /storage/splat-booko-sqlite/storage:/rails/storage
      - /storage/splat-booko-sqlite/logs/ingest:/rails/log
    mem_limit: 512M

  ducklake:
    <<: *splat-worker
    container_name: splat-booko-sqlite-ducklake
    command: bin/ducklake_worker
    volumes:
      - /storage/splat-booko-sqlite/storage:/rails/storage
      - /storage/splat-booko-sqlite/logs/ducklake:/rails/log
    environment:
      <<: *common-variables
      # Compaction's COPY (SELECT * FROM read_parquet([files...])) holds
      # per-file footer/dictionary/decompression state in working memory —
      # non-spillable read state, not just sort buffer. A bad day (bug
      # firing tens of thousands of events into one partition) can push
      # working set to ~1 GB. Give DuckDB room to handle it without
      # falling back to chunked manual compaction.
      DUCKDB_MEMORY_LIMIT: 1GB
    # Ingest's working set is tiny (per-batch COPY of ~100 rows); compaction's
    # is whatever yesterday accumulated. 1.5 G fits DUCKDB_MEMORY_LIMIT=1GB
    # plus Ruby + reserved tube bodies, with headroom for the occasional
    # backlog catch-up. Still 25% lower than the pre-cutover 2 G DuckLake
    # needed because there's no catalog SQLite buffer cache to feed.
    mem_limit: 1500M
    # Can safely scale beyond 1 now that there's no shared catalog. Each
    # consumer writes its own UUID-named Parquet file per batch; no contention.
    deploy:
      replicas: 1

  scheduler:
    <<: *splat-worker
    container_name: splat-booko-sqlite-scheduler
    command: bin/scheduler
    volumes:
      - /storage/splat-booko-sqlite/storage:/rails/storage
      - /storage/splat-booko-sqlite/logs/scheduler:/rails/log
    mem_limit: 128M

  tuber:
    image: ghcr.io/tuberq/tuber:latest
    # The image's entrypoint is the bare `tuber` binary — without a subcommand
    # it prints help and exits. Env vars only populate flag values.
    command: server
    ports:
      - "${HOST}:11331:11300"           # protocol — distinct host port from the PG-flavour tuber (11330)
      - "${HOST}:9131:9100"             # metrics — Prometheus / Uptime Kuma reachable here
    volumes:
      - /storage/splat-booko-sqlite/storage/tuber:/var/lib/tuber/binlog
    restart: unless-stopped
    mem_limit: 1500M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - TUBER_NAME=splat-booko-sqlite         # distinct from the PG-flavour tuber; shows in metrics + tuber-tui
      - TUBER_LISTEN=0.0.0.0
      - TUBER_PORT=11300
      - TUBER_BINLOG_DIR=/var/lib/tuber/binlog
      - TUBER_MAX_STORAGE_BYTES=10gb
      - TUBER_MAX_JOBS_SIZE=1gb
      - TUBER_MAX_JOB_SIZE=20mb         # must accommodate packed batches (~5MB at 100/batch)
      - TUBER_METRICS_PORT=9100
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
