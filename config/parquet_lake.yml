# ParquetLake configuration — analytics surface backed by partitioned Parquet
# files read by DuckDB. No catalog, no inlining; each ingest batch produces
# one Parquet file per (table, day-partition) that the nightly compaction job
# merges down to one file per partition.

default: &default
  data_path: storage/<%= Rails.env %>_parquet_lake/
  # Days of data to retain on disk before retention deletes the partition.
  # Splat queries default to 24h–7d windows; 30d is generous headroom.
  retention_days: 30

development:
  <<: *default

test:
  <<: *default
  data_path: tmp/test_parquet_lake/

production:
  <<: *default
  data_path: <%= ENV.fetch("PARQUET_LAKE_DATA_PATH", "storage/parquet_lake/") %>
  retention_days: <%= ENV.fetch("PARQUET_LAKE_RETENTION_DAYS", "30").to_i %>
