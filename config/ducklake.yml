# DuckLake configuration — analytics surface (DuckDB lakehouse format).
#
# Catalog: Postgres database (splat_catalog) holding metadata + inlined recent
# rows. We moved off SQLite when concurrent writes outgrew its single-writer
# model — the attach/detach-per-query pattern DuckLake uses defeats SQLite WAL.
# Data path: where parquet files are written when inlined data is flushed.
#   Set storage: s3 (with the s3 block) to write parquet to S3 instead of local FS.
#
# Data inlining lets recent rows live in the catalog directly and only flush to
# parquet when the row threshold is crossed — fast writes, no tiny-file problem.

default: &default
  catalog:
    host: <%= ENV.fetch("DUCKLAKE_CATALOG_HOST", "localhost") %>
    port: <%= ENV.fetch("DUCKLAKE_CATALOG_PORT", 5432) %>
    database: <%= ENV.fetch("DUCKLAKE_CATALOG_DB", "splat_catalog_#{Rails.env}") %>
    user: <%= ENV.fetch("DUCKLAKE_CATALOG_USER", "splat") %>
    password: <%= ENV["DUCKLAKE_CATALOG_PASSWORD"] %>
  data_path: storage/<%= Rails.env %>_ducklake_data/
  storage: local
  # data_inlining_row_limit is the per-INSERT-statement row cap for taking the
  # inline path: INSERTs with row count <= limit are inlined into the catalog,
  # INSERTs above bypass it and write parquet directly. DuckLake default is 10.
  # 50 keeps small ingest batches inline (cheap, no tiny-files problem) while
  # forcing larger coalesced batches to skip the catalog — bounds inlined-table
  # footprint so each FlushInlinedJob has less to chew through and stays
  # inside memory budget. Raised from default 10 to absorb the typical
  # DUCKLAKE_MIRROR_BATCH_SIZE=20 path without churning parquet.
  data_inlining_row_limit: 50

development:
  <<: *default

test:
  <<: *default
  data_path: tmp/test_ducklake_data/

production:
  <<: *default
  catalog:
    host: <%= ENV.fetch("DUCKLAKE_CATALOG_HOST", "postgres") %>
    port: <%= ENV.fetch("DUCKLAKE_CATALOG_PORT", 5432) %>
    database: <%= ENV.fetch("DUCKLAKE_CATALOG_DB", "splat_catalog") %>
    user: <%= ENV.fetch("DUCKLAKE_CATALOG_USER", "splat") %>
    password: <%= ENV["DUCKLAKE_CATALOG_PASSWORD"] %>
  data_path: <%= ENV.fetch("DUCKLAKE_DATA_PATH", "storage/parquet/") %>
  storage: <%= ENV.fetch("DUCKLAKE_STORAGE", "local") %>
  s3:
    bucket: <%= ENV["DUCKLAKE_S3_BUCKET"] %>
    prefix: <%= ENV.fetch("DUCKLAKE_S3_PREFIX", "splat/") %>
    region: <%= ENV["AWS_REGION"] %>
    access_key_id: <%= ENV["AWS_ACCESS_KEY_ID"] %>
    secret_access_key: <%= ENV["AWS_SECRET_ACCESS_KEY"] %>
    endpoint: <%= ENV["AWS_S3_ENDPOINT"] %>
