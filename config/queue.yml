default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    # 2 threads, not 3: DuckLake's catalog SQLite is single-writer, so
    # adding worker threads beyond 2 mostly adds lock contention rather
    # than throughput. JOB_THREADS env override lets us tune without a
    # deploy. Revisit once batched DuckLake writes land.
    - queues: "*"
      threads: <%= ENV.fetch("JOB_THREADS", 2) %>
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1
  # Scheduler reads config/recurring.yml. Without this block the supervisor
  # never starts a scheduler process — recurring tasks never fire.
  schedulers:
    - polling_interval: 1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
