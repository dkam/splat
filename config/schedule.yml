# Recurring jobs read by bin/scheduler. Each entry pushes a body of
#   { "class": "<class_name>", "args": [] }
# onto the named tube on the given schedule. The maintenance consumer in
# ingest_worker dispatches by class name.
#
# Schedules accept rufus syntax: "every Xs/m/h/d" or cron strings.
#
# `con:` adds a tuber concurrency tag so the server caps simultaneous reserves
# for jobs sharing that key. Maintenance jobs use con:1 — only one heavy
# flush/retention/cleanup can run at a time across the pool, regardless of how
# many consumers are watching or how deep the maintenance tube has backed up.
#
# `idp:` adds a tuber idempotency key. While a job with that key is already in
# the tube (ready or reserved), further puts with the same key are suppressed.
# Use on cron jobs that occasionally run longer than their cron interval —
# stops the scheduler from stacking duplicates while one is mid-flight.

# Hourly rollup of the previous hour's transactions into per-bucket counts in
# transaction_histograms. Runs a few minutes past the hour so any in-flight
# inserts for that hour have landed. Idempotent — re-running overwrites.
histogram_rollup:
  class: Analytics::HistogramRollupJob
  tube: splat.maintenance
  schedule: cron 5 * * * *
  con: 1
  idp: histogram_rollup

# Daily delete-by-timestamp of aged events/transactions/spans, plus
# incremental_vacuum to actually return pages to disk. Histograms are
# retained much longer than raw rows.
data_retention:
  class: Maintenance::RetentionJob
  tube: splat.maintenance
  schedule: cron 0 2 * * *
  con: 1

# Daily dictionary-drift check. Per-segment enumeration job that fans out
# Compression::DictTrainingJob — trains a candidate against recent samples,
# promotes if it beats the current dict by more than the gain threshold.
dictionary_drift:
  class: Compression::DictDriftJob
  tube: splat.maintenance
  schedule: cron 10 4 * * *
  con: 1
  idp: dictionary_drift

cleanup_expired_oidc_sessions:
  class: CleanupExpiredOidcSessionsJob
  tube: splat.maintenance
  schedule: cron 17 * * * *
  con: 1

# Recompute the per-table SQLite size snapshot (dbstat page scan) for the
# settings page and cache it. The scan walks every page of each DB file, so
# it's kept off the request path entirely — the settings controller only
# reads the cached snapshot. idp guards against stacking if a scan ever runs
# longer than the 15m interval on a very large DB.
storage_stats:
  class: Maintenance::StorageStatsJob
  tube: splat.maintenance
  schedule: cron */15 * * * *
  con: 1
  idp: storage_stats
