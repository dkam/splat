# Recurring jobs read by bin/scheduler. Each entry pushes a body of
#   { "class": "<class_name>", "args": [] }
# onto the named tube on the given schedule. The maintenance consumers in
# ingest_worker / ducklake_worker dispatch by class name.
#
# Schedules accept rufus syntax: "every Xs/m/h/d" or cron strings.
#
# `con:` adds a tuber concurrency tag so the server caps simultaneous reserves
# for jobs sharing that key. Maintenance jobs use con:1 — only one heavy
# flush/retention/cleanup can run at a time across the pool, regardless of how
# many consumers are watching or how deep the maintenance tube has backed up.
#
# `idp:` adds a tuber idempotency key. While a job with that key is already in
# the tube (ready or reserved), further puts with the same key are suppressed.
# Use on cron jobs that occasionally run longer than their cron interval —
# stops the scheduler from stacking duplicates while one is mid-flight.

# Drains inlined SQLite catalog rows into parquet. 1m cadence pairs with the
# tight 50-row inline limit: small per-flush working set, short SQLite lock
# windows, no multi-million-row backlog if a single flush slips.
ducklake_flush_inlined:
  class: DuckLake::FlushInlinedJob
  tube: splat.ducklake.maintenance
  schedule: every 1m
  con: 1
  idp: ducklake_flush_inlined

# Compacts adjacent parquet files within the same partition / schema version.
# Without this the 1-minute flush produces a steady stream of small files and
# scans get slow as DuckLake has to open more files per query.
ducklake_compaction:
  class: DuckLake::CompactionJob
  tube: splat.ducklake.maintenance
  schedule: every 15m
  con: 1
  idp: ducklake_compaction

# Expires snapshots older than the catalog's expire_older_than option (see
# ApplicationDucklakeRecord::CATALOG_RETENTION_WINDOW) so their parquet files
# become eligible for cleanup. Hourly cadence keeps catalog row counts bounded.
ducklake_expire_snapshots:
  class: DuckLake::ExpireSnapshotsJob
  tube: splat.ducklake.maintenance
  schedule: every 1h
  con: 1
  idp: ducklake_expire_snapshots

# Reclaims disk by deleting parquet files no longer referenced by any
# non-expired snapshot. Daily is enough — orphans lingering for hours are
# harmless, and the storage walk (especially on S3) isn't free.
ducklake_cleanup_old_files:
  class: DuckLake::CleanupOldFilesJob
  tube: splat.ducklake.maintenance
  schedule: cron 15 3 * * *
  con: 1
  idp: ducklake_cleanup_old_files

# Storage-walk safety net: deletes parquet files in the data path that
# no snapshot references. Catches crashed writers / interrupted flushes
# that CleanupOldFilesJob can't see. Staggered 30m after cleanup so the
# two don't queue back-to-back.
ducklake_delete_orphaned_files:
  class: DuckLake::DeleteOrphanedFilesJob
  tube: splat.ducklake.maintenance
  schedule: cron 45 3 * * *
  con: 1
  idp: ducklake_delete_orphaned_files

# Row-level retention for DuckLake analytics tables. Independent of the
# AR DataRetentionJob — different horizon (cold/long vs hot/short).
ducklake_retention:
  class: DuckLake::RetentionJob
  tube: splat.ducklake.maintenance
  schedule: cron 30 2 * * *
  con: 1
  idp: ducklake_retention

data_retention:
  class: DataRetentionJob
  tube: splat.maintenance
  schedule: cron 0 2 * * *
  con: 1

cleanup_expired_oidc_sessions:
  class: CleanupExpiredOidcSessionsJob
  tube: splat.maintenance
  schedule: cron 17 * * * *
  con: 1
