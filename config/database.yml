# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem "sqlite3"
#
default: &default
  adapter: sqlite3
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000
  # WAL with synchronous=NORMAL is the high-throughput SQLite config:
  # readers don't block writers, single fsync per checkpoint instead of per
  # commit. mmap_size + cache_size reduce IO under burst-write load.
  #
  # NOTE: auto_vacuum is deliberately NOT set here. A connect-time pragma is
  # silently ineffective — the foreign_keys/journal_mode pragmas above read the
  # schema first, after which SQLite ignores an auto_vacuum change until a
  # VACUUM. It's enforced in config/initializers/sqlite_auto_vacuum.rb instead.
  pragmas:
    journal_mode: wal
    synchronous: normal
    foreign_keys: "on"
    busy_timeout: 5000
    cache_size: -20000      # ~20 MB of page cache (negative = KB)
    mmap_size: 134217728    # 128 MB memory-mapped IO
    temp_store: memory

development:
  primary:
    <<: *default
    database: storage/development.sqlite3
  issues_events:
    <<: *default
    database: storage/development_issues_events.sqlite3
    migrations_paths: db/issues_events_migrate
  transactions_spans:
    <<: *default
    database: storage/development_transactions_spans.sqlite3
    migrations_paths: db/transactions_spans_migrate
  cache:
    <<: *default
    database: storage/development_cache.sqlite3
    migrations_paths: db/cache_migrate
  cable:
    <<: *default
    database: storage/development_cable.sqlite3
    migrations_paths: db/cable_migrate

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  primary:
    <<: *default
    database: storage/test.sqlite3
  issues_events:
    <<: *default
    database: storage/test_issues_events.sqlite3
    migrations_paths: db/issues_events_migrate
  transactions_spans:
    <<: *default
    database: storage/test_transactions_spans.sqlite3
    migrations_paths: db/transactions_spans_migrate


# Store production database in the storage/ directory, which by default
# is mounted as a persistent Docker volume in config/deploy.yml.
production:
  primary:
    <<: *default
    database: storage/production.sqlite3
  issues_events:
    <<: *default
    database: storage/production_issues_events.sqlite3
    migrations_paths: db/issues_events_migrate
  transactions_spans:
    <<: *default
    database: storage/production_transactions_spans.sqlite3
    migrations_paths: db/transactions_spans_migrate
  cache:
    <<: *default
    database: storage/production_cache.sqlite3
    migrations_paths: db/cache_migrate
  cable:
    <<: *default
    database: storage/production_cable.sqlite3
    migrations_paths: db/cable_migrate
