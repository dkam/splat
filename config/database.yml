# PostgreSQL configuration for Splat.
#
# Multi-database setup: a single Postgres cluster hosts three logical DBs:
#   - splat        — operational data (issues, events, transactions, etc.)
#   - splat_cache  — Solid Cache backend
#   - splat_cable  — Solid Cable backend
#
# The DuckLake catalog lives in its OWN database (`splat_catalog`) accessed
# directly by DuckDB, NOT via Active Record. See config/ducklake.yml.
#
# Active Job uses tuber via the custom adapter; no SQL backend involved.

default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("DATABASE_HOST", "localhost") %>
  port: <%= ENV.fetch("DATABASE_PORT", 5432) %>
  username: <%= ENV.fetch("DATABASE_USER", "splat") %>
  password: <%= ENV.fetch("DATABASE_PASSWORD", nil) %>
  # Pool sized for puma threads (RAILS_MAX_THREADS) plus headroom for any
  # background workers sharing this process. Ducklake worker has its own
  # consumer threads; bump RAILS_MAX_THREADS there if needed.
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  variables:
    statement_timeout: <%= ENV.fetch("DATABASE_STATEMENT_TIMEOUT_MS", 30000) %>

development:
  primary:
    <<: *default
    database: splat_development
  cache:
    <<: *default
    database: splat_development_cache
    migrations_paths: db/cache_migrate
  cable:
    <<: *default
    database: splat_development_cable
    migrations_paths: db/cable_migrate

test:
  primary:
    <<: *default
    database: splat_test
  cache:
    <<: *default
    database: splat_test_cache
    migrations_paths: db/cache_migrate
  cable:
    <<: *default
    database: splat_test_cable
    migrations_paths: db/cable_migrate

production:
  primary:
    <<: *default
    database: <%= ENV.fetch("DATABASE_NAME", "splat") %>
  cache:
    <<: *default
    database: <%= ENV.fetch("DATABASE_CACHE_NAME", "splat_cache") %>
    migrations_paths: db/cache_migrate
  cable:
    <<: *default
    database: <%= ENV.fetch("DATABASE_CABLE_NAME", "splat_cable") %>
    migrations_paths: db/cable_migrate
