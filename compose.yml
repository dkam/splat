# Production docker-compose for Splat (SQLite — the only flavour) — web +
# tuber + two worker sidecars (ingest, scheduler).
#
# compose.yml is Compose's default filename, so -f is optional:
#
#   docker compose -p splat up -d
#
# Volumes are bind-mounted relative to this file (./storage). Point them at a
# backed-up host path for a real deploy. Required .env vars: HOST_IP,
# SECRET_KEY_BASE, SPLAT_HOST, SPLAT_INTERNAL_HOST, SPLAT_ADMIN_EMAILS,
# SPLAT_EMAIL_FROM, SMTP_*, MCP_AUTH_TOKEN, SENTRY_DSN,
# SENTRY_TRACES_SAMPLE_RATE, OIDC_*, SPLAT_ALLOWED_USERS.

x-common-variables: &common-variables
  RAILS_ENV: production
  SECRET_KEY_BASE: ${SECRET_KEY_BASE}
  SPLAT_HOST: ${SPLAT_HOST}
  SPLAT_INTERNAL_HOST: ${SPLAT_INTERNAL_HOST}
  SPLAT_ADMIN_EMAILS: ${SPLAT_ADMIN_EMAILS}
  SPLAT_EMAIL_FROM: ${SPLAT_EMAIL_FROM}

  SMTP_ADDRESS: ${SMTP_ADDRESS}
  SMTP_PORT: ${SMTP_PORT}
  SMTP_USER_NAME: ${SMTP_USER_NAME}
  SMTP_PASSWORD: ${SMTP_PASSWORD}

  MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN}
  SENTRY_DSN: ${SENTRY_DSN}
  SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE}

  # Send Rails logs to stdout so `docker compose logs <service>` shows
  # them. Without this, Rails writes to log/production.log and the bind-
  # mounted host dir needs UID 1000 perms — easy to get wrong on a fresh
  # deploy and silent when it's wrong.
  RAILS_LOG_TO_STDOUT: "true"

  # Container-to-container DNS uses the service name on the container port.
  # The host-side port mapping is irrelevant inside the network.
  TUBER_URL: tuber:11300

x-splat-worker: &splat-worker
  image: ghcr.io/dkam/splat:latest
  restart: unless-stopped
  depends_on:
    - tuber
  volumes:
    - ./storage:/rails/storage
  environment:
    <<: *common-variables
  logging:
    driver: "json-file"
    options:
      max-size: "100m"
      max-file: "3"

services:
  web:
    image: ghcr.io/dkam/splat:latest
    environment:
      <<: *common-variables
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_DISCOVERY_URL: ${OIDC_DISCOVERY_URL}
      OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME}
      OIDC_REQUIRE_PKCE: ${OIDC_REQUIRE_PKCE}
      SPLAT_ALLOWED_USERS: ${SPLAT_ALLOWED_USERS}
    volumes:
      - ./storage:/rails/storage
      - ./storage/logs/web:/rails/log
    ports:
      - "${HOST_IP}:3030:3000"
    depends_on:
      - tuber
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  ingest:
    <<: *splat-worker
    command: bin/ingest_worker
    volumes:
      - ./storage:/rails/storage
      - ./storage/logs/ingest:/rails/log
    mem_limit: 512M

  scheduler:
    <<: *splat-worker
    command: bin/scheduler
    volumes:
      - ./storage:/rails/storage
      - ./storage/logs/scheduler:/rails/log
    mem_limit: 128M

  tuber:
    image: ghcr.io/tuberq/tuber:latest
    # The image's entrypoint is the bare `tuber` binary — without a subcommand
    # it prints help and exits. Env vars only populate flag values.
    command: server
    ports:
      - "${HOST_IP}:11330:11300"           # beanstalkd protocol (point tuber-tui here)
      - "${HOST_IP}:9130:9100"             # metrics — Prometheus / Uptime Kuma reachable here
    volumes:
      - ./storage/tuber:/var/lib/tuber/binlog
    restart: unless-stopped
    mem_limit: 1500M
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - TUBER_NAME=splat
      - TUBER_LISTEN=0.0.0.0
      - TUBER_PORT=11300
      - TUBER_BINLOG_DIR=/var/lib/tuber/binlog
      - TUBER_MAX_STORAGE_BYTES=10gb
      - TUBER_MAX_JOBS_SIZE=1gb
      - TUBER_MAX_JOB_SIZE=20mb         # must accommodate packed batches (~5MB at 100/batch)
      - TUBER_METRICS_PORT=9100
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
